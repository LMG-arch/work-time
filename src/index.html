<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>上班日历</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="social.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <div class="calendar-header">
      <button id="prev-month" class="nav-btn">&lt;</button>
      <div class="month-label-group">
        <span id="month-label" class="month-label"></span>
        <span id="month-lunar-label" class="month-lunar-label"></span>
      </div>
      <button id="next-month" class="nav-btn">&gt;</button>
      <button id="today-btn" class="today-btn">今天</button>
    </div>

    <!-- Calendar View -->
    <div id="calendar-view" class="page-view">
      <div class="weekday-row">
        <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
      </div>
      <div id="calendar-grid" class="calendar-grid"></div>
      <div id="detail-panel" class="detail-panel">
        <div id="detail-date" class="detail-date"></div>
        <div class="status-row">
          <button class="status-btn" data-status="work">上班</button>
          <button class="status-btn" data-status="rest">休息</button>
          <button class="status-btn" data-status="trip">出差</button>
        </div>
        <div class="color-row">
          <span class="color-label">标记颜色</span>
          <div class="color-options">
            <span class="color-dot" data-color="" title="无颜色"></span>
            <span class="color-dot" data-color="#ffcdd2" title="红色" style="background:#ffcdd2"></span>
            <span class="color-dot" data-color="#c8e6c9" title="绿色" style="background:#c8e6c9"></span>
            <span class="color-dot" data-color="#bbdefb" title="蓝色" style="background:#bbdefb"></span>
            <span class="color-dot" data-color="#fff9c4" title="黄色" style="background:#fff9c4"></span>
            <span class="color-dot" data-color="#e1bee7" title="紫色" style="background:#e1bee7"></span>
            <span class="color-dot" data-color="#ffe0b2" title="橙色" style="background:#ffe0b2"></span>
            <span class="color-dot" data-color="#b2dfdb" title="青色" style="background:#b2dfdb"></span>
          </div>
        </div>
        <div class="tag-section">
          <div id="tag-list" class="tag-list"></div>
          <div class="tag-input-row">
            <input id="tag-input" type="text" placeholder="添加标签，回车确认" maxlength="10">
            <button id="tag-add-btn" class="tag-add-btn">+</button>
          </div>
          <div class="tag-quick">
            <span class="quick-tag" data-tag="加班">加班</span>
            <span class="quick-tag" data-tag="迟到">迟到</span>
            <span class="quick-tag" data-tag="早退">早退</span>
            <span class="quick-tag" data-tag="会议">会议</span>
            <span class="quick-tag" data-tag="培训">培训</span>
            <span class="quick-tag" data-tag="请假">请假</span>
          </div>
        </div>
        <div class="todo-section">
          <div class="todo-header-row">
            <span class="todo-title">待办</span>
            <button id="todo-add-btn" class="todo-add-btn">+ 添加待办</button>
          </div>
          <div id="todo-list" class="todo-list"></div>
        </div>
        <div class="note-section">
          <textarea id="note-input" placeholder="备注今天做了什么..." rows="3"></textarea>
          <button id="save-note-btn" class="save-btn">保存</button>
        </div>
      </div>
    </div>

    <!-- Stats View -->
    <div id="stats-view" class="page-view" style="display:none;">
      <div id="stats-content" class="stats-content"></div>
    </div>

    <!-- Clock-in & Todo View -->
    <div id="clockin-view" class="page-view" style="display:none;">
      <div class="clockin-view-content">
        <div class="clockin-header-row">
          <div class="clockin-today-label" id="clockin-today-label"></div>
          <button id="clockin-settings-btn" class="clockin-settings-btn" title="提醒设置">⚙</button>
        </div>
        <div id="clockin-today-reminders" class="clockin-today-reminders"></div>
        <div class="clockin-history-section">
          <div class="clockin-history-title">打卡记录</div>
          <div id="clockin-history" class="clockin-history"></div>
        </div>
        <div id="clockin-todo-section" class="todo-section" style="margin-top:16px;">
          <div id="todo-view-content" class="todo-view-content"></div>
        </div>
      </div>
    </div>

    <!-- Reminder Settings Modal -->
    <div id="reminder-modal" class="modal">
      <div class="modal-content">
        <div class="modal-title">打卡提醒设置</div>
        <div class="reminder-settings-list" id="reminder-settings-list"></div>
        <div class="modal-actions">
          <button id="reminder-modal-cancel" class="modal-btn cancel">取消</button>
          <button id="reminder-modal-save" class="modal-btn confirm">保存</button>
        </div>
      </div>
    </div>

    <!-- Social View -->
    <div id="social-view" class="page-view" style="display:none;">
      <div id="social-content" class="social-content"></div>
    </div>

    <!-- Post Modal -->
    <div id="post-modal" class="modal">
      <div class="post-modal-content">
        <div class="modal-title">发布动态</div>
        <textarea id="post-text-input" placeholder="分享你的心情..." rows="4"></textarea>
        <div id="post-image-preview" class="post-image-preview" style="display:none;">
          <img id="post-image-preview-img" src="">
          <span id="post-image-remove" class="post-image-remove">&times;</span>
        </div>
        <div class="post-modal-toolbar">
          <label id="post-image-label" class="post-image-btn">📷 图片
            <input type="file" id="post-image-input" accept="image/*" style="display:none;">
          </label>
        </div>
        <div class="modal-actions">
          <button id="post-modal-cancel" class="modal-btn cancel">取消</button>
          <button id="post-modal-submit" class="modal-btn confirm">发布</button>
        </div>
      </div>
    </div>

    <!-- Add Todo Modal -->
    <div id="todo-modal" class="modal">
      <div class="modal-content">
        <div class="modal-title">添加待办</div>
        <input id="todo-text-input" type="text" placeholder="待办内容" maxlength="50" class="modal-input">
        <div class="modal-row">
          <span class="modal-label">类型</span>
          <div class="modal-type-btns">
            <button class="type-btn active" data-type="once">指定日期</button>
            <button class="type-btn" data-type="weekly">每周重复</button>
          </div>
        </div>
        <div id="todo-once-row" class="modal-row">
          <span class="modal-label">日期</span>
          <input id="todo-date-input" type="date" class="modal-date-input">
          <span id="todo-date-lunar-hint" class="todo-date-lunar-hint"></span>
        </div>
        <div id="todo-lunar-row" class="modal-row" style="display:none">
          <span class="modal-label">农历</span>
          <div class="lunar-date-picker">
            <select id="todo-lunar-month" class="lunar-select"></select>
            <select id="todo-lunar-day" class="lunar-select"></select>
          </div>
        </div>
        <div class="modal-row">
          <span class="modal-label">历法</span>
          <div class="modal-type-btns">
            <button class="calendar-type-btn active" data-caltype="solar">公历</button>
            <button class="calendar-type-btn" data-caltype="lunar">农历</button>
          </div>
        </div>
        <div id="todo-weekly-row" class="modal-row" style="display:none">
          <span class="modal-label">重复</span>
          <div class="weekday-picker">
            <span class="wd-btn" data-wd="1">一</span>
            <span class="wd-btn" data-wd="2">二</span>
            <span class="wd-btn" data-wd="3">三</span>
            <span class="wd-btn" data-wd="4">四</span>
            <span class="wd-btn" data-wd="5">五</span>
            <span class="wd-btn" data-wd="6">六</span>
            <span class="wd-btn" data-wd="0">日</span>
          </div>
        </div>
        <div class="modal-actions">
          <button id="todo-modal-cancel" class="modal-btn cancel">取消</button>
          <button id="todo-modal-confirm" class="modal-btn confirm">确定</button>
        </div>
      </div>
    </div>

    <!-- Settings View -->
    <div id="settings-view" class="page-view" style="display:none;">
      <div class="settings-content">
        <div class="settings-group">
          <div class="settings-group-title">数据管理</div>
          <div class="settings-btn-row">
            <button id="export-btn" class="settings-action-btn">📤 导出数据</button>
            <button id="import-btn" class="settings-action-btn">📥 导入数据</button>
          </div>
        </div>
        <div class="settings-group">
          <div class="settings-group-title">好友圈服务配置</div>
          <div class="settings-hint">在 <a href="https://supabase.com" target="_blank">supabase.com</a> 免费注册，创建项目后填入以下信息</div>
          <div class="settings-field">
            <label>Project URL</label>
            <input id="supabase-url-input" class="settings-input" placeholder="https://xxx.supabase.co">
          </div>
          <div class="settings-field">
            <label>Anon Key</label>
            <input id="supabase-key-input" class="settings-input" placeholder="sb_publishable_xxx 或 eyJxxx">
          </div>
          <div class="settings-btn-row">
            <button id="supabase-save-btn" class="settings-action-btn">💾 保存配置</button>
            <button id="supabase-test-btn" class="settings-action-btn">🔍 测试连接</button>
          </div>
          <div class="settings-hint" style="margin-top:8px;">
            首次配置后需在 Supabase SQL Editor 执行 <b>supabase-setup.sql</b> 创建数据表
          </div>
          <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:12px;">
            <button id="supabase-clear-btn" class="settings-action-btn" style="color:#e53935;border-color:#e53935;">🗑 清除云端数据</button>
            <div class="settings-hint" style="margin-top:4px;">清除所有好友圈数据（帖子、好友、点赞等），不影响配置</div>
          </div>
        </div>
        <div class="settings-group">
          <div class="settings-group-title">主题风格</div>
          <div id="settings-theme-grid" class="theme-grid"></div>
        </div>
        <div class="settings-group">
          <div class="settings-group-title">其他</div>
          <button id="auto-launch-btn" class="settings-action-btn full">开机自启</button>
        </div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <button id="home-btn" class="tool-btn active" title="日历">📅 日历</button>
      <button id="clockin-btn" class="tool-btn primary-btn" title="打卡待办">⏰ 打卡</button>
      <button id="social-btn" class="tool-btn" title="好友圈">🌐 好友</button>
      <button id="stats-btn" class="tool-btn" title="月度统计">📊 统计</button>
      <button id="settings-btn" class="tool-btn" title="设置">⚙ 设置</button>
    </div>
  </div>

  <script>
    // Load Supabase JS: local first, CDN fallback
    (function() {
      var script = document.createElement('script');
      var fallback = document.createElement('script');
      fallback.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
      script.src = '../lib/supabase.min.js';
      script.onerror = function() { document.head.appendChild(fallback); };
      document.head.appendChild(script);
    })();
  </script>
  <script src="holidays.js"></script>
  <script src="lunar.js"></script>
  <script src="web-api.js"></script>
  <script src="supabase.js"></script>
  <script src="social.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
