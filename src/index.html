<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>上班日历</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="social.css">
  <script type="module" src="./vue-main.js"></script>
</head>
<body>
  <div id="app" style="display:none"></div>
  <div class="app">
    <!-- Header -->
    <div class="calendar-header">
      <button id="prev-month" class="nav-btn">&lt;</button>
      <div class="month-label-group">
        <span id="month-label" class="month-label"></span>
        <span id="month-lunar-label" class="month-lunar-label"></span>
      </div>
      <button id="next-month" class="nav-btn">&gt;</button>
      <button id="today-btn" class="today-btn">今天</button>
    </div>

    <!-- Calendar View -->
    <div id="calendar-view" class="page-view">
      <div class="weekday-row">
        <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
      </div>
      <div id="calendar-grid" class="calendar-grid"></div>
      <div id="detail-panel" class="detail-panel">
        <div class="todo-section">
          <div class="todo-header-row">
            <span class="todo-title">待办</span>
            <button id="todo-add-btn" class="todo-add-btn">+ 添加待办</button>
          </div>
          <!-- Todo list rendered by TodoListApp.vue via DetailPanel -->
        </div>
      </div>
    </div>

    <!-- Stats View -->
    <div id="stats-view" class="page-view" style="display:none;">
      <div id="stats-content" class="stats-content"></div>
    </div>

    <!-- Clock-in & Todo View (Vue renders ClockinPage.vue into #app) -->

    <!-- Social View -->
    <div id="social-view" class="page-view" style="display:none;">
      <div id="social-content" class="social-content"></div>
    </div>

    <!-- Post Modal -->
    <div id="post-modal" class="modal">
      <div class="post-modal-content">
        <div class="modal-title">发布动态</div>
        <textarea id="post-text-input" placeholder="分享你的心情..." rows="4"></textarea>
        <div id="post-image-preview" class="post-image-preview" style="display:none;">
          <img id="post-image-preview-img" src="">
          <span id="post-image-remove" class="post-image-remove"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></span>
        </div>
        <div class="post-modal-toolbar">
          <label id="post-image-label" class="post-image-btn">图片
            <input type="file" id="post-image-input" accept="image/*" style="display:none;">
          </label>
        </div>
        <div class="modal-actions">
          <button id="post-modal-cancel" class="modal-btn cancel">取消</button>
          <button id="post-modal-submit" class="modal-btn confirm">发布</button>
        </div>
      </div>
    </div>

    <!-- Settings View -->
    <div id="settings-view" class="page-view" style="display:none;">
      <div class="settings-content">
        <div class="settings-group">
          <div class="settings-group-title">账号</div>
          <div id="account-logged-out">
            <div class="settings-hint" style="margin-bottom:8px;">注册账号后数据不会丢失，换设备可登录恢复</div>
            <div class="settings-field">
              <label>用户名</label>
              <input id="reg-username" class="settings-input" placeholder="设置用户名" maxlength="20">
            </div>
            <div class="settings-field">
              <label>密码</label>
              <input id="reg-password" class="settings-input" type="password" placeholder="设置密码" maxlength="32">
            </div>
            <div class="settings-btn-row">
              <button id="reg-btn" class="settings-action-btn">注册</button>
              <button id="login-btn" class="settings-action-btn">登录</button>
            </div>
            <div id="auth-status" class="settings-hint" style="margin-top:4px;"></div>
          </div>
          <div id="account-logged-in" style="display:none;">
            <div style="display:flex;align-items:center;gap:12px;">
              <div style="position:relative;width:40px;height:40px;cursor:pointer;" title="点击更换头像">
                <div id="account-avatar" class="post-avatar avatar-placeholder" style="width:40px;height:40px;font-size:18px;pointer-events:none;"></div>
                <input type="file" id="avatar-upload-input" accept="image/*" style="position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer;">
              </div>
              <div>
                <div id="account-nickname" style="font-weight:600;"></div>
                <div id="account-id" class="settings-hint" style="margin:0;"></div>
              </div>
            </div>
            <button id="logout-btn" class="settings-action-btn full" style="margin-top:8px;">退出登录</button>
          </div>
        </div>
        <div class="settings-group">
          <div class="settings-group-title">数据管理</div>
          <div class="settings-btn-row">
            <button id="export-btn" class="settings-action-btn">导出数据</button>
            <button id="import-btn" class="settings-action-btn">导入数据</button>
          </div>
        </div>
        <div class="settings-group">
          <div class="settings-group-title">好友圈服务配置</div>
          <div class="settings-hint">在 <a href="https://supabase.com" target="_blank">supabase.com</a> 免费注册，创建项目后填入以下信息</div>
          <div class="settings-field">
            <label>Project URL</label>
            <input id="supabase-url-input" class="settings-input" placeholder="https://xxx.supabase.co">
          </div>
          <div class="settings-field">
            <label>Anon Key</label>
            <input id="supabase-key-input" class="settings-input" type="password" placeholder="sb_publishable_xxx 或 eyJxxx">
          </div>
          <div class="settings-btn-row">
            <button id="supabase-save-btn" class="settings-action-btn">保存配置</button>
            <button id="supabase-test-btn" class="settings-action-btn">测试连接</button>
          </div>
          <div class="settings-hint" style="margin-top:8px;">
            首次配置后需在 Supabase SQL Editor 执行 <b>supabase-setup.sql</b> 创建数据表
          </div>
          <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:12px;">
            <button id="supabase-clear-btn" class="settings-action-btn" style="color:#e53935;border-color:#e53935;">清除云端数据</button>
            <div class="settings-hint" style="margin-top:4px;"><svg class="icon-warn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l9 16H3z"/><path d="M12 9v5M12 17.5v.5"/></svg>管理员功能：重置全部数据（移入回收站，可恢复），不影响配置</div>
          </div>
        </div>
        <div class="settings-group">
          <div class="settings-group-title">数据同步</div>
          <div class="settings-hint">登录同一账号即可多端同步，数据变更自动上传云端</div>
          <div class="settings-btn-row" style="margin-top:8px;">
            <button id="sync-toggle-btn" class="settings-action-btn">自动同步：关闭</button>
            <button id="sync-now-btn" class="settings-action-btn">立即同步</button>
          </div>
          <div class="settings-btn-row" style="margin-top:8px;">
            <button id="push-to-cloud-btn" class="settings-action-btn"><svg class="icon-up" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M6 11l6-6 6 6"/></svg>上传本地数据</button>
            <button id="pull-from-cloud-btn" class="settings-action-btn"><svg class="icon-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M6 13l6 6 6-6"/></svg>下载云端数据</button>
          </div>
          <div class="settings-hint" style="margin-top:4px;font-size:11px;color:#999;">上传：本地覆盖云端 | 下载：云端覆盖本地</div>
        </div>
        <div class="settings-group">
          <div class="settings-group-title settings-collapsible" id="theme-toggle">主题风格 <svg class="collapse-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></div>
          <div id="settings-theme-grid" class="theme-grid" style="display:none;"></div>
        </div>
        <div class="settings-group">
          <div class="settings-group-title settings-collapsible" id="nav-toggle">导航栏设置 <svg class="collapse-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></div>
          <div id="nav-settings-content" style="display:none;">
            <div class="settings-hint" style="margin-bottom:8px;">选择底部导航栏显示的功能</div>
            <div id="nav-items-list"></div>
          </div>
        </div>
        <div class="settings-group" id="android-perms-group" style="display:none;">
          <div class="settings-group-title settings-collapsible" id="perms-toggle">安卓权限 <svg class="collapse-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></div>
          <div id="perms-content" style="display:none;">
            <div class="settings-hint" style="margin-bottom:8px;">以下权限影响通知和更新功能，建议全部开启</div>
            <div id="perms-list"></div>
            <button id="open-app-settings-btn" class="settings-action-btn full" style="margin-top:8px;">前往系统设置</button>
            <button id="diagnose-notifications-btn" class="settings-action-btn full" style="margin-top:8px;background:#2196F3;">诊断通知问题</button>
          </div>
        </div>
        <div class="settings-group">
          <div class="settings-group-title">其他</div>
          <button id="auto-launch-btn" class="settings-action-btn full">开机自启</button>
          <button id="check-update-btn" class="settings-action-btn full" style="margin-top:8px;">检查更新</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toolbar (移到 .app 外面，作为 body 的直接子元素，永远固定在底部) -->
  <div class="toolbar">
    <div class="toolbar-indicator"></div>
    <button id="home-btn" class="tool-btn active" title="日历">
      <svg class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="4.5" width="17" height="16" rx="2.5"/><path d="M3.5 9h17M8 2.5v4M16 2.5v4"/></svg>
      <span>日历</span>
    </button>
    <button id="clockin-btn" class="tool-btn primary-btn" title="打卡待办">
      <svg class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.5"/><path d="M12 7.5V12l3 2"/></svg>
      <span>打卡</span>
    </button>
    <button id="social-btn" class="tool-btn" title="好友圈">
      <svg class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 19a5.5 5.5 0 0 1 11 0"/><circle cx="17" cy="9" r="2.6"/><path d="M15.5 19a4.8 4.8 0 0 1 5-4.2"/></svg>
      <span>好友</span>
    </button>
    <button id="stats-btn" class="tool-btn" title="月度统计">
      <svg class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16M7 20v-7M12 20V6M17 20v-4"/></svg>
      <span>统计</span>
    </button>
    <button id="settings-btn" class="tool-btn" title="设置">
      <svg class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2.5v3M12 18.5v3M2.5 12h3M18.5 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/></svg>
      <span>设置</span>
    </button>
  </div>

  <!-- 星海绽放主题：右上角开花标记（仅 cosmic 主题显示） -->
  <div class="bloom-mark" aria-hidden="true">
    <svg viewBox="0 0 100 100" width="100%" height="100%">
      <g class="bloom-petals" fill="#ff8fab">
        <ellipse cx="50" cy="26" rx="13" ry="22"/>
        <ellipse cx="50" cy="26" rx="13" ry="22" transform="rotate(72 50 50)"/>
        <ellipse cx="50" cy="26" rx="13" ry="22" transform="rotate(144 50 50)"/>
        <ellipse cx="50" cy="26" rx="13" ry="22" transform="rotate(216 50 50)"/>
        <ellipse cx="50" cy="26" rx="13" ry="22" transform="rotate(288 50 50)"/>
      </g>
      <circle cx="50" cy="50" r="12" fill="#ffd166"/>
    </svg>
  </div>

  <script src="lib/supabase.min.js"></script>
  <script src="utils.js"></script>
  <script src="holidays.js"></script>
  <script src="lunar.js"></script>
  <script src="web-api.js"></script>
  <script src="supabase-core.js"></script>
  <script src="supabase-social.js"></script>
  <script src="supabase-sync.js"></script>
  <script src="social.js"></script>
  <script src="calendar.js"></script>
  <script src="todos.js"></script>
  <script src="reminders.js"></script>
  <script src="stats.js"></script>
  <script src="settings.js"></script>
  <script src="updater.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
